services:
  - type: web
    name: aether-store-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn --chdir backend backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aether-store-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: aether-store-db
    plan: free
